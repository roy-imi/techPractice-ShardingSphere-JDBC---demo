# legacy 模式直连原始单库单表，不经过 ShardingSphere。
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://127.0.0.1:13306/asset_legacy?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&useUnicode=true
spring.datasource.username=asset_app
spring.datasource.password=asset-password

# 单库阶段只需要一个连接池；数值刻意设小，避免教学环境浪费连接。
spring.datasource.hikari.maximum-pool-size=8
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.pool-name=legacy-pool

# legacy 表由 Docker 初始化 SQL 管理，不让 Hibernate/Flyway暗中改表。
# 禁止 Spring Boot 在应用启动时自动执行数据库初始化 SQL。避免出现两套建表机制互相干扰，例如：
#1.Docker 已经建过表，Spring 又重复建表。
#2.Spring 插入重复种子数据。
#3.Docker SQL 与应用 SQL 的字段、索引不一致。
#4.应用启动账号被迫拥有建表权限。
#5.应用启动时意外修改数据库结构。

# 常见取值是：
#always	无论什么数据库都执行 schema.sql/data.sql
#embedded	只对 H2、HSQLDB 等内嵌数据库执行
#never	完全关闭 Spring SQL 初始化
spring.sql.init.mode=never

# 让路由推演接口明确展示“改造前单表”，而不是误报为标准版季度表。
# Demo 自定义的“路由推演展示开关”，只影响调试接口返回的说明，不参与真实数据库路由。
#它作用于这个接口：
#GET /api/debug/routes/expected
demo.legacy-mode=true

# 改造前基线仍是一张普通表，因此只校验 Demo 种子数据所在年份，不启用季度热窗口。
#限制demo数据的可访问年份
demo.sharding.supported-start-date=2026-01-01
demo.sharding.supported-end-date=2026-12-31
