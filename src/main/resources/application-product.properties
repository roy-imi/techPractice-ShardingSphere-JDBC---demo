# 产品化入口同时支持标准版和大客户版。
# false 只关闭“tenant_id 分库”，不会关闭季度分表和读写分离。
sharding.enabled=${SHARDING_ENABLED:false}

# 分库键是架构契约，不是真正可任意选择的字符串；启动时只接受 tenant_id。
sharding.sharding-key=${SHARDING_KEY:tenant_id}

# 当前业务季度由部署环境显式提供；季度推进需要走运维流程并滚动重启。
# Java 配置会把同一个值转交给两份 ShardingSphere YAML，避免业务校验与路由算法漂移。
demo.sharding.current-quarter=${CURRENT_QUARTER:2026Q3}

# 四个物理槽位中固定保留当前季度和前两个季度；算法启动时强制要求为 3。
demo.sharding.retained-quarter-count=3

# 旧季度退出在线窗口后至少等待 3 天；脚本仍要求归档、对账与人工确认。
demo.sharding.purge-grace-days=3

# ShardingSphere 物理表由 Docker/DBA 脚本管理，应用启动不自动建表。
spring.sql.init.mode=never
