# 应用名只用于日志和诊断。
spring.application.name=shardingsphere-jdbc-inspection-demo

# 默认进入产品化部署入口；学习改造前基线时再显式切换到 legacy。
spring.profiles.default=product

# 避开常见的 8080 端口冲突。
server.port=18080

# 本项目包含无认证的教学 API 和故意触发广播路由的反例接口，默认只监听本机。
# 若确需容器化或远程访问，必须先补认证、授权和网络边界，再由部署配置显式覆盖。
server.address=127.0.0.1

# 数据库字段是 snake_case，Java 属性是 camelCase，让 MyBatis 自动转换。
mybatis.configuration.map-underscore-to-camel-case=true

# Mapper XML 放在 resources/mapper，而不是接口同包目录，因此必须显式告诉 MyBatis 扫描位置。
# classpath*: 也能扫描依赖 JAR；这里保留通用写法，避免“接口已注册但 SQL statement not found”。
mybatis.mapper-locations=classpath*:mapper/*.xml

# SQL 参数为空时使用 JDBC NULL，避免部分驱动把类型推断成 OTHER。
mybatis.configuration.jdbc-type-for-null=NULL

# 统一 JSON 日期格式，避免日期在前后端之间受系统时区影响。
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Shanghai

# 教学项目保留清晰的应用日志；ShardingSphere 实际路由 SQL 由其独立 logger 输出。
logging.level.com.example.assetinspection=INFO
logging.level.org.apache.shardingsphere.sql=INFO

# 危险实验接口默认开启，是为了观察“缺 record_date 导致四张季度表广播”；生产必须关闭或删除。
demo.unsafe-query-enabled=true

# 历史迁移组件默认关闭；数据库启动后可按 README 在 product 模式临时开启。
demo.migration.enabled=false

# 可选的旧库迁移读取源。只有 demo.migration.enabled=true 时才真正创建只读连接池。
demo.migration.legacy.jdbc-url=jdbc:mysql://127.0.0.1:13306/asset_legacy?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&useUnicode=true
demo.migration.legacy.username=asset_app
demo.migration.legacy.password=asset-password
demo.migration.legacy.driver-class-name=com.mysql.cj.jdbc.Driver
